name: gate
# The skill's first executable lint gate (PHILOSOPHY P2: mechanism, not intention). Runs the
# deterministic artifact/contract checks in tools/verify_matrix.py on every push and PR. Exit
# non-zero = BLOCK the change. Detection only — it never edits the matrix.
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run deterministic matrix gate (offline — network gates skipped via --no-net)
        # --no-net keeps CI deterministic + hermetic: the REPO/STAR/GHACTIVE network gates need a
        # gh token + live GitHub and would make every push flaky on rate-limits / transient 5xx.
        # They are a maintainer-side check (run `python tools/verify_matrix.py` locally, authenticated,
        # before a matrix change). CI enforces every offline durable-contract + data-integrity check.
        run: python tools/verify_matrix.py --no-net
